<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1 span { font-size: 18px; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1d4ed8; }
    button:disabled {
      background: #94a3b8;
      cursor: default;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #64748b;
      min-height: 18px;
    }
    #status.error { color: #dc2626; }
    #status.success { color: #16a34a; }
    #status.warning { color: #d97706; }
    #xhr-list {
      margin-top: 8px;
      font-size: 11px;
      color: #94a3b8;
      max-height: 80px;
      overflow: hidden;
    }
    #xhr-list .xhr-label {
      font-weight: 500;
      color: #64748b;
      margin-bottom: 2px;
    }
    #xhr-list .xhr-url {
      font-family: "SF Mono", Menlo, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1><span>👻</span> GhostType</h1>
  <button id="capture">Capture Now</button>
  <div id="status">Waiting for tab...</div>
  <div id="xhr-list" style="display:none"></div>
  <script src="popup.js"></script>
</body>
</html>
